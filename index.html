<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Bracket</title>
<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial, sans-serif;
  overflow-x:auto;
}.bracket{ display:flex; padding:20px; gap:60px; }

.round{ display:flex; flex-direction:column; justify-content:space-around; position:relative; }

.pair{ position:relative; display:flex; flex-direction:column; gap:40px; }

/* vertical connector between two matches */ .pair::after{ content:""; position:absolute; right:-30px; top:25%; width:2px; height:50%; background:#fff; }

.match{ background:#1a1a1a; padding:10px; border-radius:12px; width:140px; text-align:center; position:relative; }

.team{ padding:4px 0; }

/* horizontal line to next round */ .match::after{ content:""; position:absolute; right:-30px; top:50%; width:30px; height:2px; background:#fff; }

.final .match::after{ display:none; }

.final{ display:flex; flex-direction:column; justify-content:center; align-items:center; }

.champion{ margin-top:20px; font-size:20px; font-weight:bold; }

@media(max-width:600px){ .match{width:120px; font-size:12px;} } </style>

</head>
<body><div class="bracket">  <!-- Round 1 -->  <div class="round">
    <div class="pair">
      <div class="match">
        <div class="team">Dakhil 22</div>
        <div class="team">Dakhil 23</div>
      </div>
      <div class="match">
        <div class="team">Dakhil 2001</div>
        <div class="team">Dakhil 2013</div>
      </div>
    </div><div class="pair">
  <div class="match">
    <div class="team">Dakhil 2017</div>
    <div class="team">Dakhil 2021</div>
  </div>
  <div class="match">
    <div class="team">Dakhil 2015</div>
    <div class="team">Dakhil 2016</div>
  </div>
</div>

  </div>  <!-- Round 2 -->  <div class="round">
    <div class="pair">
      <div class="match">
        <div class="team">Winner M1</div>
        <div class="team">Winner M2</div>
      </div>
      <div class="match">
        <div class="team">Winner M3</div>
        <div class="team">Winner M4</div>
      </div>
    </div>
  </div>  <!-- Semi -->  <div class="round">
    <div class="match">
      <div class="team">Winner Q1</div>
      <div class="team">Winner Q2</div>
    </div>
  </div>  <!-- Final -->  <div class="round final">
    <div class="match">
      <div class="team">TBD</div>
      <div class="team">TBD</div>
    </div>
    <div class="champion">🏆 Champion</div>
  </div></div></body>
</html>

<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Bracket</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;}
h2{text-align:center;padding:10px}/* scroll container */ .bracket{ display:flex; gap:20px; overflow-x:auto; padding:15px; }

.round{ display:flex; flex-direction:column; gap:20px; min-width:160px; }

.match{ background:#1a1a1a; padding:12px; border-radius:12px; text-align:center; }

.team{ display:flex; justify-content:space-between; padding:4px 0; }

.final{ border:2px solid gold; background:#222; }

.lottery{ color:#facc15; font-size:12px; }

.loser{ background:#7c2d12; }

/* mobile tweaks */ @media (max-width:600px){ .round{min-width:140px} .match{font-size:14px} } </style>

</head>
<body><h2>🏆 Alhera Bracket (Swipe ➡️)</h2><div class="bracket"><!-- ROUND 1 --><div class="round">
<h4>R1</h4>
<div class="match"><div class="team">A <span>1</span></div><div class="team">B <span>0</span></div></div>
<div class="match"><div class="team">C <span>2</span></div><div class="team">D <span>1</span></div></div>
<div class="match"><div class="team">E <span>3</span></div><div class="team">F <span>1</span></div></div>
<div class="match"><div class="team">G <span>2</span></div><div class="team">H <span>0</span></div></div>
<div class="match"><div class="team">I <span>1</span></div><div class="team">J <span>0</span></div></div>
<div class="match"><div class="team">K <span>4</span></div><div class="team">L <span>2</span></div></div>
<div class="match"><div class="team">M <span>2</span></div><div class="team">N <span>1</span></div></div>
<div class="match"><div class="team">O <span>3</span></div><div class="team">P <span>2</span></div></div>
<div class="match"><div class="team">Q <span>1</span></div><div class="team">R <span>0</span></div></div>
</div><!-- ROUND 2 --><div class="round">
<h4>R2</h4>
<div class="match lottery">🎲 One team to R3</div>
<div class="match">A vs C</div>
<div class="match">E vs G</div>
<div class="match">I vs K</div>
<div class="match">M vs O</div>
</div><!-- ROUND 3 --><div class="round">
<h4>R3</h4>
<div class="match lottery">🎲 Direct to Semi</div>
<div class="match">W10 vs W11</div>
<div class="match">W12 vs W13</div>
<div class="match loser">🔁 Loser Match</div>
</div><!-- SEMI --><div class="round">
<h4>Semi</h4>
<div class="match">A vs C</div>
<div class="match">E vs 🎲</div>
</div><!-- FINAL --><div class="round">
<h4>Final</h4>
<div class="match final">Final Match 🏆</div>
</div></div></body>
</html>

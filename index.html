<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bracket UI</title>
<style>
body{background:#000;color:#fff;font-family:Arial;}
.bracket{display:flex;justify-content:center;gap:60px;padding:40px}
.round{display:flex;flex-direction:column;justify-content:center;gap:40px}
.match{
  background:#1a1a1a;
  padding:15px;
  border-radius:14px;
  width:140px;
  text-align:center;
  position:relative;
}
.team{display:flex;justify-content:space-between;margin:5px 0}
.line-right::after{
  content:"";
  position:absolute;
  right:-30px;
  top:50%;
  width:30px;
  height:2px;
  background:#fff;
}
.line-left::before{
  content:"";
  position:absolute;
  left:-30px;
  top:50%;
  width:30px;
  height:2px;
  background:#fff;
}
.connector{
  width:2px;
  height:40px;
  background:#fff;
  margin:auto;
}
.final{
  background:#333;
  border:2px solid gold;
}
</style>
</head>
<body><div class="bracket"><!-- LEFT SIDE --><div class="round">
  <div class="match line-right">
    <div class="team">A <span>1</span></div>
    <div class="team">B <span>0</span></div>
  </div>  <div class="match line-right">
    <div class="team">C <span>2</span></div>
    <div class="team">D <span>1</span></div>
  </div>
</div><!-- SEMI LEFT --><div class="round">
  <div class="match line-left line-right">
    <div>TBD</div>
    <div>TBD</div>
  </div>
</div><!-- FINAL --><div class="round">
  <div class="match final">
    <div>W1</div>
    <div>W2</div>
    <div style="margin-top:10px;color:gold">FINAL</div>
  </div>
</div><!-- SEMI RIGHT --><div class="round">
  <div class="match line-left line-right">
    <div>TBD</div>
    <div>TBD</div>
  </div>
</div><!-- RIGHT SIDE --><div class="round">
  <div class="match line-left">
    <div class="team">E <span>3</span></div>
    <div class="team">F <span>2</span></div>
  </div>  <div class="match line-left">
    <div class="team">G <span>1</span></div>
    <div class="team">H <span>4</span></div>
  </div>
</div></div></body>
</html>
